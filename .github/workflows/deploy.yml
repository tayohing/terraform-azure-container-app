name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: acrcontainerapp
  CONTAINER_APP_NAME: ca-containerapp-stage
  RESOURCE_GROUP: rg-containerapp-stage
  IMAGE_NAME: python-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: stage/services/python-api
        run: terraform init

      - name: Terraform apply
        working-directory: stage/services/python-api
        run: terraform apply -auto-approve

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker build
        working-directory: app
        run: docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .

      - name: Docker push
        run: docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username $(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv) \
            --registry-password $(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
